<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxy Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    <div id="topbar">
      <h1>Galaxy Game</h1>
      <div id="resources">
        <div class="resource">
          <span class="icon">&#9889;</span>
          <span class="value" id="res-energy">0</span>
          <span class="label">Energy</span>
        </div>
        <div class="resource">
          <span class="icon">&#9851;</span>
          <span class="value" id="res-minerals">0</span>
          <span class="label">Minerals</span>
        </div>
        <div class="resource">
          <span class="icon">&#128300;</span>
          <span class="value" id="res-science">0</span>
          <span class="label">Science</span>
        </div>
        <div class="resource">
          <span class="icon">&#9878;</span>
          <span class="value" id="res-alloys">0</span>
          <span class="label">Alloys</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <span id="tick-display">Tick: 0</span>
        <div id="speed-controls">
          <button data-speed="paused">&#10074;&#10074;</button>
          <button data-speed="slow">&#9654;</button>
          <button data-speed="normal">&#9654;&#9654;</button>
          <button data-speed="fast">&#9654;&#9654;&#9654;</button>
        </div>
      </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-section">
        <h2>Galaxy Game</h2>
        <p style="font-size:0.8rem;color:#6666aa">Click a star system to inspect it.<br>Select your ships and right-click to move.</p>
      </div>
    </div>

    <!-- Galaxy map canvas -->
    <div id="canvas-container">
      <canvas id="galaxy-canvas"></canvas>
    </div>

    <!-- Bottom panel -->
    <div id="bottom-panel">
      <div class="panel-section">
        <h3>Welcome</h3>
        <p style="font-size:0.8rem;color:#6666aa">Start the game with the play button above. Explore the galaxy with your science ship!</p>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toasts"></div>

  <script type="module" src="game.js"></script>
</body>
</html>
